version: 2
updates:
  # Python dependencies (uv: pyproject.toml + uv.lock)
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    groups:
      python:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
